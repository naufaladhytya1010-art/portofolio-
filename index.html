<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pendapatan dan Pengeluaran</title>
        <link rel="stylesheet" href="style.css">
    </head>
<body>

    <div class="container">
        <h1>Pendapatan dan Pengeluaran</h1>

        <div class="saldo-box">
            <h2>Saldo Saat Ini</h2>
            <p id="saldo">Rp 0</p>
        </div>

        <form id="form">
            <input type="text" id="nama" placeholder="Keterangan" required>

            <input type="number" id="jumlah" placeholder="Jumlah Uang" required>

            <select id="tipe">
                <option value="masuk">Pemasukan</option>
                <option value="keluar">Pengeluaran</option>
            </select>

            <button type="submit">Tambah</button>
        </form>

        <button id="resetbtn">Reset Data</button>

        <h2>Riwayat Transaksi</h2>
        <ul id="riwayat"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
